# Nginx reverse proxy for nuanu-parking-ai dashboard
# Exposes dashboard on host port 80
# Full configuration finalized in Story 3.4

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://dashboard:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CRITICAL: Required for Server-Sent Events (SSE) to work through nginx
            # Without this, SSE events are buffered and never reach the browser
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;

            # Required for SSE connection keep-alive
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }
    }
}
