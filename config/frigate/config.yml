# Frigate NVR configuration for nuanu-parking-ai
# Full camera and motion zone setup is done in Story 1.3.
# This is a minimal stub to allow Frigate to start.
#
# Documentation: https://docs.frigate.video/configuration/

mqtt:
  host: mosquitto
  port: 1883
  # topic_prefix: frigate  # default — events published to frigate/events

# Detectors: use CPU for development; switch to coral/gpu for production
detectors:
  cpu1:
    type: cpu
    num_threads: 3

